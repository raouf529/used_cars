<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>used car price prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="introduction">
            <h1>Welcome to the Used Car Price Prediction</h1>
            <p>Get accurate price predictions for used cars based on various features.</p>
            <small>prices are based on indian market trends</small><br>
            <button id="start">Get Started</button>
        </div>
        <div class="collect_data">
            <h1>Enter car details</h1>
            <form>
                <div class="form-group">
                    <label for="brand">Brand:</label>
                    <select id="brand" name="brand" required>
                        <option value="" disabled selected>Select Brand</option>
                        <option value="Maruti">Maruti</option>
                        <option value="Hyundai">Hyundai</option>
                        <option value="Tata">Tata</option>
                        <option value="Renault">Renault</option>
                        <option value="Honda">Honda</option>
                        <option value="KIA">KIA</option>
                        <option value="Mahindra">Mahindra</option>
                        <option value="Ford">Ford</option>
                        <option value="Volkswagen">Volkswagen</option>
                        <option value="Datsun">Datsun</option>
                        <option value="Skoda">Skoda</option>
                        <option value="MG">MG</option>
                        <option value="Toyota">Toyota</option>
                        <option value="Jeep">Jeep</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="model">Model:</label>
                    <select id="model" name="model" required>
                        <option value="" disabled selected id="start_option">Select a brand first</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fuel_type">Fuel Type:</label>
                    <select id="fuel_type" name="fuel_type" required>
                        <option value="" disabled selected>Select Fuel Type</option>
                        <option value="Petrol">Petrol</option>
                        <option value="Diesel">Diesel</option>
                        <option value="CNG">CNG</option>
                        <option value="Electric">Electric</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="transmission">Transmission:</label>
                    <select id="transmission" name="transmission" required>
                        <option value="" disabled selected>Select Transmission</option>
                        <option value="Manual">Manual</option>
                        <option value="Automatic">Automatic</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="owners">Number of Previous Owners:</label>
                    <select id="owners" name="owners" required>
                        <option value="" disabled selected>Select Number of Owners</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3+</option>
                    </select>
                
                </div>
                <div class="form-group">
                    <label for="spare_key">Spare Key Available?</label>
                    <select id="spare_key" name="spare_key" required>
                        <option value="" disabled selected>Select Spare Key Status</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="has_insurance">Has Insurance?</label>
                    <select id="has_insurance" name="has_insurance" required>
                        <option value="" disabled selected>Select Insurance Status</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="year">Year of Manufacture:</label>
                    <input type="number" id="year" name="year" min="1980" max="2025" required>
                </div>

                <div class="form-group">
                    <label for="driven">driven(km):</label>
                    <input type="number" id="driven" name="driven" step="0.1" required>
                </div>
                <div class="form-group">
                    <label for="engine_capacity">Engine Capacity (CC):</label>
                    <input type="number" id="engine_capacity" name="engine_capacity" required>
                </div>
                <div class="form-group">
                    <label for="registration_number">Registration Number:</label>
                    <input type="text" id="registration_number" name="registration_number" required>
                </div>
            </form>
            <button type="submit" id="submit">Predict Price</button>
        </div>
        <div id="result" class="hidden">
            <h2>Predicted Price:</h2>
            <p id="predicted_price"></p>
            <button id="new_prediction">Make Another Prediction</button>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
